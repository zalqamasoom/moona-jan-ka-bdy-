<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE ACCESS TERMINAL</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 2.5em;
            text-align: center;
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skews(-0.5deg); }
            4%, 60% { transform: translate(-2px, 0) skews(0.5deg); }
            62% { transform: translate(0,0) skews(5deg); }
        }

        #hacker-terminal {
            max-width: 600px;
            text-align: left;
            padding: 20px;
            border: 1px solid #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .command { color: #0f0; }
        .output { color: #888; margin-left: 20px; display: block; }
        .cursor { animation: blink 0.5s infinite; }

        @keyframes blink { 50% { opacity: 0; } }

        #birthday-content {
            display: none;
            text-align: center;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffe4e1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff4b2b;
            font-family: 'Arial', sans-serif;
            z-index: 10;
        }

        #slideshow-container {
            width: 80%;
            max-width: 500px;
            height: 400px;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 20px;
            background-color: #fff;
        }

        #slideshow-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #slideshow-container img.active { display: block; }

        #matrix-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.15;
            z-index: -1;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="hacker-terminal">
        <h1>UNAUTHORIZED ACCESS DETECTED</h1>
        <p><span class="command">$&gt; ssh root@moona_bday_database</span></p>
        <p class="output">Connecting to server... [OK]</p>
        <p id="typing-text"></p>
        <span class="cursor">_</span>
    </div>

    <div id="birthday-content">
        <h1>ACCESS GRANTED. HAPPY BIRTHDAY MOONA! 🎉 ✨</h1>
        <div id="slideshow-container"></div>
    </div>

    <div id="suspense-music"></div>
    <div id="birthday-music"></div>

    <script>
        // --- Sab photos ab .jpeg format mein hain ---
        const photoSources = [
            'img1.jpeg', 'img2.jpeg', 'img3.jpeg', 'img4.jpeg', 'img5.jpeg',
            'img6.jpeg', 'img7.jpeg', 'img8.jpeg', 'img9.jpeg', 'img10.jpeg'
        ];
        
        const slideContainer = document.getElementById('slideshow-container');
        photoSources.forEach((src, index) => {
            const img = document.createElement('img');
            img.src = src;
            if (index === 0) img.classList.add('active');
            slideContainer.appendChild(img);
        });

        const terminalText = document.getElementById('typing-text');
        const phrases = [
            "DECRYPTING CORE FILES...",
            "WARNING: COMPROMISING FIREWALL...",
            "TARGET MATCH FOUND: MOONA ✨",
            "INITIALIZING SURPRISE.EXE..."
        ];

        let pIdx = 0; let cIdx = 0;
        function type() {
            if (pIdx < phrases.length) {
                if (cIdx < phrases[pIdx].length) {
                    terminalText.innerHTML += phrases[pIdx].charAt(cIdx);
                    cIdx++;
                    setTimeout(type, 80);
                } else {
                    terminalText.innerHTML += "<br>";
                    cIdx = 0; pIdx++;
                    setTimeout(type, 800);
                }
            } else { launchSurprise(); }
        }

        function launchSurprise() {
            document.getElementById('suspense-music').innerHTML = ""; 
            document.getElementById('birthday-content').style.display = 'flex';
            document.getElementById('birthday-music').innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/F9Esh7pY8o0?autoplay=1&loop=1&playlist=F9Esh7pY8o0" frameborder="0" allow="autoplay"></iframe>';
            startSlideshow();
        }

        let sIdx = 0;
        function startSlideshow() {
            const slides = document.querySelectorAll('#slideshow-container img');
            setInterval(() => {
                slides[sIdx].classList.remove('active');
                sIdx = (sIdx + 1) % slides.length;
                slides[sIdx].classList.add('active');
            }, 3000);
        }

        window.onload = function() {
            // Dangerous music starts
            document.getElementById('suspense-music').innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/N4Y_0vVf9I4?autoplay=1&loop=1&start=20" frameborder="0" allow="autoplay"></iframe>';
            setTimeout(type, 1500);
        };

        // Matrix Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        setInterval(() => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            rainDrops.forEach((y, i) => {
                ctx.fillText(alphabet[Math.floor(Math.random() * alphabet.length)], i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            });
        }, 30);
    </script>

</body>
</html>
